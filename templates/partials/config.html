<div id="config-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-md transition-opacity duration-300">
    <div class="bg-zinc-900 border border-zinc-800/80 rounded-2xl w-full max-w-lg p-6 shadow-2xl relative animate-in fade-in zoom-in-95 duration-200">
        <button 
            type="button" 
            onclick="document.getElementById('modal-container').innerHTML = ''"
            class="absolute top-4 right-4 text-zinc-500 hover:text-zinc-200 transition-colors p-1.5 hover:bg-zinc-800 rounded-lg cursor-pointer"
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>

        <h2 class="text-lg font-bold text-white mb-5 font-mono flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" class="w-4 h-4 text-indigo-400">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
            Node Config
        </h2>
        
        <form hx-put="/api/config/node/{{ node.node_id }}" hx-target="#dashboard-container" hx-swap="innerHTML" hx-on::after-request="if(event.detail.successful) document.getElementById('modal-container').innerHTML = ''" class="space-y-4">
            <div class="max-h-[60vh] overflow-y-auto pr-1.5 space-y-4">
                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1.5 font-mono">Node Name</label>
                    <input 
                        type="text" 
                        name="name" 
                        value="{{ node.name }}" 
                        class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3.5 py-2 text-xs text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono transition-all"
                    />
                </div>

                <div>
                    <label class="block text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1.5 font-mono">Base URL</label>
                    <input 
                        type="text" 
                        name="base_url" 
                        value="{{ node.base_url }}" 
                        class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3.5 py-2 text-xs text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono transition-all"
                    />
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1.5 font-mono">Node Type</label>
                        <select 
                            name="node_type" 
                            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3 py-2 text-xs text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono transition-all"
                        >
                            <option value="small-task" {% if node.node_type == 'small-task' %}selected{% endif %}>Small Task</option>
                            <option value="llm" {% if node.node_type == 'llm' %}selected{% endif %}>LLM</option>
                            <option value="gpu" {% if node.node_type == 'gpu' %}selected{% endif %}>GPU</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-zinc-500 uppercase tracking-widest mb-1.5 font-mono">Tier</label>
                        <input 
                            type="number" 
                            name="node_tier" 
                            value="{{ node.node_tier }}" 
                            class="w-full bg-zinc-950 border border-zinc-800 rounded-xl px-3.5 py-2 text-xs text-zinc-100 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 font-mono transition-all"
                        />
                    </div>
                </div>

                <div class="pt-4 border-t border-zinc-800/80">
                    <h3 class="text-xs font-semibold text-zinc-400 uppercase tracking-widest mb-4 font-mono">Active Models (Services)</h3>
                    {% for model_name, services in node.active_services.items() %}
                        {% for service in services %}
                        <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800/60 mb-3.5 space-y-3.5">
                            <div class="flex justify-between items-center border-b border-zinc-800/40 pb-2">
                                <span class="text-xs font-semibold text-zinc-300 font-mono truncate max-w-[200px]">{{ model_name }}</span>
                                <span class="text-[9px] bg-indigo-500/10 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/10 font-mono">GPU #{{ service.gpu_id }}</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-[9px] font-semibold text-zinc-600 uppercase tracking-wider mb-1 font-mono">Context (n_ctx)</label>
                                    <input 
                                        type="number" 
                                        name="services[{{ model_name }}][n_ctx]" 
                                        value="{{ service.n_ctx }}" 
                                        class="w-full bg-zinc-900 border border-zinc-800/80 rounded-lg px-2.5 py-1.5 text-xs text-zinc-200 focus:outline-none focus:border-indigo-500 font-mono transition-colors"
                                    />
                                </div>
                                <div>
                                    <label class="block text-[9px] font-semibold text-zinc-600 uppercase tracking-wider mb-1 font-mono">Layers (n_gpu_layers)</label>
                                    <input 
                                        type="number" 
                                        name="services[{{ model_name }}][n_gpu_layers]" 
                                        value="{{ service.n_gpu_layers }}" 
                                        class="w-full bg-zinc-900 border border-zinc-800/80 rounded-lg px-2.5 py-1.5 text-xs text-zinc-200 focus:outline-none focus:border-indigo-500 font-mono transition-colors"
                                    />
                                </div>
                                <div>
                                    <label class="block text-[9px] font-semibold text-zinc-600 uppercase tracking-wider mb-1 font-mono">Priority</label>
                                    <input 
                                        type="number" 
                                        name="services[{{ model_name }}][priority]" 
                                        value="{{ service.priority }}" 
                                        class="w-full bg-zinc-900 border border-zinc-800/80 rounded-lg px-2.5 py-1.5 text-xs text-zinc-200 focus:outline-none focus:border-indigo-500 font-mono transition-colors"
                                    />
                                </div>
                                <div>
                                    <label class="block text-[9px] font-semibold text-zinc-600 uppercase tracking-wider mb-1 font-mono">Total Slots</label>
                                    <input 
                                        type="number" 
                                        name="services[{{ model_name }}][total_slots]" 
                                        value="{{ service.total_slots }}" 
                                        class="w-full bg-zinc-900 border border-zinc-800/80 rounded-lg px-2.5 py-1.5 text-xs text-zinc-200 focus:outline-none focus:border-indigo-500 font-mono transition-colors"
                                    />
                                </div>
                            </div>
                        </div>
                        {% endfor %}
                    {% endfor %}
                </div>
            </div>

            <div class="flex justify-end gap-2.5 pt-4 border-t border-zinc-800/80">
                <button 
                    type="button" 
                    onclick="document.getElementById('modal-container').innerHTML = ''"
                    class="px-4 py-2 rounded-xl text-xs font-medium text-zinc-400 hover:text-zinc-200 hover:bg-zinc-800 transition-all cursor-pointer"
                >
                    Cancel
                </button>
                <button 
                    type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-xs font-medium transition-all shadow-md shadow-indigo-600/10 cursor-pointer"
                >
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
