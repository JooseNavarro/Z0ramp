<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dashboard &bull; Z0ramp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen relative overflow-x-hidden selection:bg-indigo-500/30 selection:text-indigo-200">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-indigo-950/20 via-zinc-950/0 to-zinc-950/0 pointer-events-none z-0"></div>

    <div class="max-w-5xl mx-auto px-6 py-12 relative z-10">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-zinc-900">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></span>
                    <span class="text-xs font-semibold tracking-widest text-indigo-400 uppercase font-mono">Z0ramp AI</span>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">AI Services Hub</h1>
            </div>
            
            <button 
                hx-get="/api/status/card" 
                hx-target="#dashboard-container" 
                hx-swap="innerHTML"
                class="bg-zinc-900 hover:bg-zinc-850 text-zinc-200 hover:text-white border border-zinc-800 hover:border-zinc-700 px-4 py-2 rounded-xl text-xs font-medium flex items-center gap-2 cursor-pointer transition-all duration-300 shadow-sm shadow-black/40 hover:shadow-indigo-500/5 group [&.htmx-request]:opacity-50"
            >
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3.5 h-3.5 group-[.htmx-request]:animate-spin">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                <span class="inline group-[.htmx-request]:hidden">Update Status</span>
                <span class="hidden group-[.htmx-request]:inline">loading...</span>
            </button>
        </header>

        <main id="dashboard-container" class="min-h-[300px]">
            {% include "partials/card_content.html" %}
        </main>
    </div>

    <div id="modal-container"></div>
</body>
</html>
